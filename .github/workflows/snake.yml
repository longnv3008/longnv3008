# Snake contribution animation
# Đặt file này tại: .github/workflows/snake.yml  (trong repo longnv3008/longnv3008)
# Nó tự sinh ảnh snake vào nhánh "output" — README đã trỏ sẵn tới nhánh này.

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # chạy mỗi ngày
  workflow_dispatch:        # cho phép chạy tay
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
